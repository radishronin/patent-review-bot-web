# Cloudflare Workers configuration
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/
#
# Before deploying:
#   1. Replace YOUR_CLOUDFLARE_ACCOUNT_ID below (find it in the Cloudflare dashboard sidebar)
#   2. Run: wrangler secret put ANTHROPIC_API_KEY
#      (paste your key when prompted — it is stored encrypted, never in this file)
#   3. Run: wrangler deploy
#
# After deploying, update the PROXY_URL constant in index.html to match
# the *.workers.dev URL printed by `wrangler deploy`.

name       = "patent-review-proxy"
main       = "worker/index.js"
account_id = "621503c8e22faabde1bbc94440dc4004"

compatibility_date = "2024-09-23"

[observability]
enabled = true
